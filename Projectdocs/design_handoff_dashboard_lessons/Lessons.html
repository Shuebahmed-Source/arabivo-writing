<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArabivoWrite — Lessons</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────── */
:root {
  --brand:       #0E7A4B;
  --brand-deep:  #0A5C39;
  --brand-tint:  #E7F4ED;
  --brand-tint2: #D6EEE0;
  --ink:         #15231C;
  --muted:       #5C6B63;
  --faint:       #8B9991;
  --line:        #E1EBE5;
  --card:        #FFFFFF;
  --bg:          #F4F9F6;
  --font-d: 'Fredoka', system-ui, sans-serif;
  --font-b: 'Hanken Grotesk', system-ui, sans-serif;
  --font-ar: 'Noto Naskh Arabic', serif;
  --amber:       #B86E1F;
  --amber-tint:  #FEF0E0;
  --amber-tint2: #F5DFB8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-b); color: var(--ink); background: var(--bg);
  -webkit-font-smoothing: antialiased; min-height: 100vh;
}

/* ── NAV ─────────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 100;
  height: 60px; padding: 0 clamp(20px,5vw,64px);
  background: rgba(244,249,246,.92); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.wordmark { font-family: var(--font-d); font-weight: 600; font-size: 19px; color: var(--ink); text-decoration: none; letter-spacing: -.01em; }
.wordmark b { color: var(--brand); font-weight: 700; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { font-family: var(--font-b); font-size: 14px; font-weight: 500; padding: 7px 16px; border-radius: 10px; text-decoration: none; transition: all .15s; }
.nav-tab.active { background: var(--brand); color: #fff; font-weight: 600; }
.nav-tab:not(.active) { color: var(--muted); }
.nav-tab:not(.active):hover { background: var(--brand-tint); color: var(--ink); }
.nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--brand-tint2); overflow: hidden; cursor: pointer; flex-shrink: 0; display: grid; place-items: center; }

/* ── MAIN ────────────────────────────────────────────────── */
.main {
  max-width: 960px; margin: 0 auto;
  padding: clamp(36px,6vh,60px) clamp(20px,4vw,44px) 100px;
  display: flex; flex-direction: column; gap: 52px;
}

/* ── SECTION BLOCK ───────────────────────────────────────── */
.section-block { display: flex; flex-direction: column; gap: 20px; }

/* ── LESSON GRID ─────────────────────────────────────────── */
.lesson-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.lesson-grid.compact { gap: 8px; }

/* ── LESSON CARD ─────────────────────────────────────────── */
.lc {
  background: var(--card); border: 1.5px solid var(--line);
  border-radius: 16px; padding: 18px 18px 15px;
  display: flex; flex-direction: column; gap: 7px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s;
  text-decoration: none; color: inherit;
  box-shadow: 0 1px 0 rgba(21,35,28,.03), 0 4px 12px -8px rgba(21,35,28,.07);
}
.lc:hover {
  transform: translateY(-2px);
  box-shadow: 0 1px 0 rgba(21,35,28,.04), 0 10px 24px -8px rgba(21,35,28,.13);
}
.lc.done:hover  { border-color: var(--brand-tint2); }
.lc.active-lesson { border-color: var(--amber-tint2); }
.lc.active-lesson:hover { border-color: #e8c070; }

@media (max-width: 660px) { .lesson-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 420px) { .lesson-grid { grid-template-columns: 1fr; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:.001ms !important; transition-duration:.05ms !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

/* ── DATA ────────────────────────────────────────────────── */
const SECTIONS = [
  {
    id: 'arabic-letters',
    title: 'Arabic letters',
    ar: 'أبجد',
    desc: 'Isolated letter shapes — the alphabet before worrying about connections.',
    lessons: [
      { id:1, title:'Letters I',    desc:"Alif, bā', tā', thā', and jīm.",                              done:5, total:5 },
      { id:2, title:'Letters II',   desc:"Hā', khā', dāl, dhāl, and rā'.",                              done:5, total:5 },
      { id:3, title:'Letters III',  desc:"Zāy, sīn, shīn, ṣād, and ḍād.",                              done:5, total:5 },
      { id:4, title:'Letters IV',   desc:"Ṭā', ẓā', 'ayn, ghayn, and fā'.",                            done:5, total:5 },
      { id:5, title:'Letters V',    desc:"Qāf, kāf, lām, mīm, nūn, hā', wāw, and yā'.",               done:8, total:8 },
    ]
  },
  {
    id: 'letter-forms',
    title: 'Letter forms (positions)',
    ar: 'جـ ـجـ ـج',
    desc: 'Initial, medial, and final shapes as letters join in real words.',
    lessons: [
      { id:6, title:'Letter forms', desc:"Initial, medial, and final jīm and nūn.", done:4, total:4 },
    ]
  },
  {
    id: 'simple-words',
    title: 'Simple words',
    ar: 'سلام',
    desc: 'Short, high-frequency words to practice flow and proportion.',
    lessons: [
      { id:7,  title:'Simple words I',   desc:"Greetings and short everyday words you already know from culture.",    done:4, total:4 },
      { id:8,  title:'Simple words II',  desc:"People, home, and light — concrete words with smooth joins.",          done:6, total:6 },
      { id:9,  title:'Simple words III', desc:"Everyday nouns: pen, eye, sea, dog, and sun.",                         done:5, total:5 },
      { id:10, title:'Body & people',    desc:"Face, limbs, and people — short words for clear tracing.",             done:6, total:6 },
      { id:11, title:'Home & objects',   desc:"Things around the house: furniture, dishes, and light.",               done:6, total:6 },
      { id:12, title:'Nature',           desc:"Sky, weather, and plants — common three-letter nouns.",                done:6, total:6 },
      { id:13, title:'Animals',          desc:"Creatures big and small; smooth joins and familiar shapes.",           done:6, total:6 },
    ]
  },
  {
    id: 'challenge-words',
    title: 'Challenge words',
    ar: 'صعب',
    desc: 'Visually wild Arabic — repeating shapes, dot walls, and famous one-word puzzles. Pick any item; no strict order.',
    lessons: [
      { id:14, title:'Can you write this?', desc:"Words and shapes that look impossible until you trace them — built for wow moments, not everyday vocabulary.", done:4, total:8 },
    ]
  },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "density": "regular" }/*EDITMODE-END*/;

/* ── HELPERS ─────────────────────────────────────────────── */
function status(done, total) {
  if (done === total && total > 0) return 'done';
  if (done > 0) return 'progress';
  return 'available';
}

/* ── PROGRESS DOTS ───────────────────────────────────────── */
function Dots({ done, total }) {
  return (
    <div style={{ display:'flex', gap:3, alignItems:'center', flexWrap:'wrap' }}>
      {Array.from({ length: total }, (_, i) => (
        <span key={i} style={{
          width: 5.5, height: 5.5, borderRadius:'50%', display:'block', flexShrink:0,
          background: i < done ? 'var(--brand)' : 'var(--line)'
        }}/>
      ))}
    </div>
  );
}

/* ── LESSON BADGE ────────────────────────────────────────── */
function LBadge({ s }) {
  const map = {
    done:      { bg:'var(--brand-tint)',  col:'var(--brand-deep)', lbl:'✓ Done'      },
    progress:  { bg:'var(--amber-tint)',  col:'var(--amber)',      lbl:'In progress' },
    available: { bg:'var(--bg)',          col:'var(--faint)',      lbl:'Available', border:'1px solid var(--line)' },
  };
  const c = map[s];
  return (
    <span style={{
      background:c.bg, color:c.col, border:c.border||'none',
      padding:'3px 9px', borderRadius:999,
      fontFamily:'var(--font-b)', fontSize:11, fontWeight:700,
      flexShrink:0, whiteSpace:'nowrap'
    }}>
      {c.lbl}
    </span>
  );
}

/* ── LESSON CARD ─────────────────────────────────────────── */
function LessonCard({ lesson, compact }) {
  const s = status(lesson.done, lesson.total);
  const cls = `lc${s==='done' ? ' done' : s==='progress' ? ' active-lesson' : ''}`;
  const countColor = s==='done' ? 'var(--brand)' : s==='progress' ? 'var(--amber)' : 'var(--faint)';
  const pad = compact ? 14 : 18;
  return (
    <a className={cls} href="#" style={{ padding:`${pad}px ${pad}px ${pad-3}px` }}>
      {/* Title + badge + chevron */}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
        <span style={{
          fontFamily:'var(--font-d)', fontSize:15, fontWeight:600,
          color:'var(--ink)', flex:1, minWidth:0, lineHeight:1.2
        }}>
          {lesson.title}
        </span>
        <div style={{ display:'flex', alignItems:'center', gap:5, flexShrink:0 }}>
          <LBadge s={s}/>
          <span style={{ color:'var(--faint)', fontSize:16, lineHeight:1, marginTop:1 }}>›</span>
        </div>
      </div>

      {/* Description */}
      <p style={{ fontSize:12.5, color:'var(--muted)', lineHeight:1.45 }}>
        {lesson.desc}
      </p>

      {/* Progress dots + count */}
      <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:compact ? 4 : 6 }}>
        <Dots done={lesson.done} total={lesson.total}/>
        <span style={{ fontSize:11, fontWeight:600, color:countColor, whiteSpace:'nowrap' }}>
          {lesson.done === lesson.total
            ? `${lesson.total} lessons`
            : `${lesson.done} / ${lesson.total}`}
        </span>
      </div>
    </a>
  );
}

/* ── SECTION BLOCK ───────────────────────────────────────── */
function SectionBlock({ section, compact }) {
  const totalDone  = section.lessons.reduce((a,l) => a + l.done, 0);
  const totalTotal = section.lessons.reduce((a,l) => a + l.total, 0);
  const allDone    = totalDone === totalTotal;
  const inProgress = !allDone && totalDone > 0;

  const accentCol  = allDone ? 'var(--brand)' : 'var(--amber)';
  const badgeBg    = allDone ? 'var(--brand-tint)' : 'var(--amber-tint)';
  const badgeCol   = allDone ? 'var(--brand-deep)' : 'var(--amber)';
  const badgeLbl   = allDone ? '✓ Complete' : `${totalDone} / ${totalTotal}`;

  return (
    <div className="section-block">

      {/* Section header */}
      <div style={{ position:'relative', paddingBottom:20, borderBottom:'1.5px solid var(--line)' }}>

        {/* Large faint Arabic watermark */}
        <span style={{
          position:'absolute', right:0, top:'50%', transform:'translateY(-50%)',
          fontFamily:'var(--font-ar)', fontSize:80, fontWeight:700, lineHeight:1,
          color: accentCol, opacity:.055,
          direction:'rtl', userSelect:'none', pointerEvents:'none'
        }}>
          {section.ar}
        </span>

        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16 }}>
          {/* Left: title + description */}
          <div style={{ display:'flex', flexDirection:'column', gap:5, position:'relative', zIndex:1 }}>
            <h2 style={{
              fontFamily:'var(--font-d)', fontSize:21, fontWeight:600,
              color:'var(--ink)', lineHeight:1.1, letterSpacing:'-.01em'
            }}>
              {section.title}
            </h2>
            <p style={{ fontSize:14, color:'var(--muted)', lineHeight:1.5, maxWidth:520 }}>
              {section.desc}
            </p>
          </div>

          {/* Right: completion badge */}
          <span style={{
            flexShrink:0, marginTop:3, position:'relative', zIndex:1,
            background:badgeBg, color:badgeCol,
            padding:'5px 13px', borderRadius:999,
            fontFamily:'var(--font-b)', fontSize:12, fontWeight:700, whiteSpace:'nowrap'
          }}>
            {badgeLbl}
          </span>
        </div>
      </div>

      {/* Lesson cards */}
      <div className={`lesson-grid${compact ? ' compact' : ''}`}>
        {section.lessons.map(l => (
          <LessonCard key={l.id} lesson={l} compact={compact}/>
        ))}
      </div>

    </div>
  );
}

/* ── APP ────────────────────────────────────────────────── */
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const compact = t.density === 'compact';

  return (
    <>
      {/* NAV */}
      <nav className="nav">
        <a href="#" className="wordmark">Arabivo<b>Write</b></a>
        <div className="nav-tabs">
          <a href="#" className="nav-tab">Dashboard</a>
          <a href="#" className="nav-tab active">Lessons</a>
        </div>
        <div className="nav-avatar">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="18" fill="#D6EEE0"/>
            <circle cx="18" cy="14" r="6"  fill="#8BB8A0"/>
            <path d="M4 34c0-7.7 6.3-14 14-14s14 6.3 14 14" fill="#8BB8A0"/>
          </svg>
        </div>
      </nav>

      {/* MAIN */}
      <main className="main">

        {/* Page header */}
        <header style={{ display:'flex', flexDirection:'column', gap:8 }}>
          <h1 style={{
            fontFamily:'var(--font-d)', fontWeight:600,
            fontSize:'clamp(28px,4vw,38px)', color:'var(--ink)',
            letterSpacing:'-.015em', lineHeight:1.1
          }}>
            Lessons
          </h1>
          <p style={{ fontSize:15, color:'var(--muted)', lineHeight:1.6, maxWidth:580 }}>
            Open a section, then work through lessons in order. After{' '}
            <strong style={{ color:'var(--ink)' }}>Good</strong> or{' '}
            <strong style={{ color:'var(--ink)' }}>Excellent</strong>, you move to the next
            item automatically. Finish every item in a section to unlock the next.
          </p>
        </header>

        {/* All sections */}
        {SECTIONS.map(s => (
          <SectionBlock key={s.id} section={s} compact={compact}/>
        ))}

      </main>

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Lessons" />
        <TweakRadio
          label="Density"
          value={t.density}
          options={['regular', 'compact']}
          onChange={v => setTweak('density', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
